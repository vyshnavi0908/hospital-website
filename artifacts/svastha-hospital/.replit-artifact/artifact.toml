kind = "web"
previewPath = "/"
title = "SVASTHA Hospital Website"
version = "1.0.0"
id = "artifacts/svastha-hospital"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19640

[services.development]
run = "pnpm --filter @workspace/svastha-hospital run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/svastha-hospital", "run", "build" ]
publicDir = "artifacts/svastha-hospital/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19640"
BASE_PATH = "/"
